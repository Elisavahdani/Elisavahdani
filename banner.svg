<svg width="100%" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Dark Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Neon Glow Effect for Text -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Abstract Tech Shapes (Circles/Lines) -->
    <radialGradient id="glowCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="300" fill="url(#bgGradient)" />
  
  <!-- Abstract Decorative Elements -->
  <circle cx="1000" cy="50" r="250" fill="url(#glowCircle)" />
  <circle cx="200" cy="250" r="200" fill="url(#glowCircle)" />
  <line x1="0" y1="150" x2="1200" y2="150" stroke="rgba(0, 212, 255, 0.1)" stroke-width="1" />

  <!-- Professional Typography: Elisa Vahdani -->
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" filter="url(#neonGlow)" style="letter-spacing: 5px;">
    ELISA VAHDANI
  </text>
  
  <!-- Subtitle or Role -->
  <text x="50%" y="65%" font-family="Arial, sans-serif" font-size="20" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle" style="letter-spacing: 10px; opacity: 0.8;">

    FULL-STACK DEVELOPER
  </text>
</svg>

<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Deep Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Abstract Colors -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff00cc;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff00cc;stop-opacity:0" />
    </radialGradient>

    <!-- Text Shadow/Glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="300" fill="url(#bgGradient)" />

  <!-- Abstract Shapes (Blurred Orbs) -->
  <circle cx="200" cy="100" r="150" fill="url(#glowBlue)" />
  <circle cx="1000" cy="200" r="180" fill="url(#glowPink)" />
  <circle cx="600" cy="150" r="120" fill="url(#glowBlue)" opacity="0.5" />

  <!-- Decorative Abstract Lines -->
  <path d="M0 250 Q 300 200 600 250 T 1200 200" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" fill="transparent" />
  <path d="M0 280 Q 400 230 800 280 T 1200 240" stroke="rgba(255, 0, 204, 0.1)" stroke-width="1" fill="transparent" />

  <!-- Main Text: ELISA VAHDANI -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
        fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="72" 
        filter="url(#textGlow)" style="letter-spacing: 8px;">
    ELISA VAHDANI
  </text>
  
  <!-- Subtext (Optional/Dev Identity) -->
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" 
        fill="rgba(255, 255, 255, 0.6)" font-family="Arial, sans-serif" font-size="18" 
        style="letter-spacing: 4px; text-transform: uppercase;">
    Full-Stack Developer
  </text>
</svg>
